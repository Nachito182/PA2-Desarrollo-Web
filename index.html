<script>

const video = document.getElementById("videoFondo");

const inicio = 7;
const fin = 85;

video.addEventListener("loadedmetadata", ()=>{

    video.currentTime = inicio;
    video.play();

});

video.addEventListener("timeupdate", ()=>{

    if(video.currentTime >= fin){

        video.currentTime = inicio;
        video.play();

    }

});

</script>
